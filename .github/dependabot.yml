# Automated dependency updates for the CommonGrants monorepo.
#
# Split strategy:
#   - Dependabot handles non-catalog deps (Python SDK, Actions, non-catalog workspace deps)
#   - A scheduled GitHub Action (deps-catalog-check.yml) handles catalog-managed deps
#     (avoids dependabot-core pnpm catalog bugs: #14339, #13347, #12244, #12445, #13000)
#
# See DEPENDENCY_MANAGEMENT.md for full strategy documentation.

version: 2
updates:
  # ── World A: Root pnpm workspace (shared lockfile) ──
  # Handles only non-catalog deps. Catalog deps (@typespec/*, vitest, etc.)
  # are ignored here and managed by the deps-catalog-check workflow instead.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/New_York"
    groups:
      website-framework:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "starlight-*"
          - "prettier-plugin-astro"
          - "eslint-plugin-astro"
      tooling:
        patterns:
          - "typescript"
          - "ts-node"
          - "tsx"
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-*"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      runtime:
        exclude-patterns:
          - "astro"
          - "@astrojs/*"
          - "starlight-*"
          - "typescript"
          - "ts-node"
          - "tsx"
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-*"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major bumps handled manually to control breaking changes
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Internal workspace deps
      - dependency-name: "@common-grants/*"
      # Catalog-managed deps — handled by scheduled workflow instead
      # (avoids dependabot-core pnpm catalog bugs #14339, #13347, #12244, #12445, #13000)
      - dependency-name: "@eslint/js"
      - dependency-name: "@types/node"
      - dependency-name: "@typespec/*"
      - dependency-name: "@vitest/*"
      - dependency-name: "eslint"
      - dependency-name: "eslint-config-prettier"
      - dependency-name: "eslint-plugin-prettier"
      - dependency-name: "eslint-plugin-vitest"
      - dependency-name: "globals"
      - dependency-name: "prettier"
      - dependency-name: "ts-node"
      - dependency-name: "typescript"
      - dependency-name: "typescript-eslint"
      - dependency-name: "vitest"
      - dependency-name: "zod"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  # ── World B: Python SDK (pip, isolated lockfile) ──

  # lib/python-sdk (pip/Poetry, weekly)
  - package-ecosystem: "pip"
    directory: "/lib/python-sdk"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      all-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore"
      include: "scope"

  # ── World C: GitHub Actions ──

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
