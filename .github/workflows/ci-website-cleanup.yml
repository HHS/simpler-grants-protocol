name: "CI - Website: Cleanup PR Preview"

on:
  pull_request:
    types: [closed]
    paths:
      - website/**
      - .github/workflows/ci-website-preview.yml
      - .github/workflows/ci-website-cleanup.yml

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    name: Cleanup PR preview
    # Previews are not deployed for dependabot PRs (see ci-website-preview.yml),
    # so there's nothing to clean up and `wrangler delete` would 404.
    # Use pull_request.user.login because github.actor on `closed` events is
    # the person who closed/merged the PR, not the PR author.
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Delete Worker for PR
        run: |
          pnpm dlx wrangler@4.27.0 delete --name cg-pr-${{ github.event.pull_request.number }} --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete preview link comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🗑️ **Preview Cleaned Up**

            The preview for this PR has been automatically deleted.
          edit-mode: replace
