name: "CI - Example: Pennslyvania API Run Checks"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - examples/pa-opportunity-example/**
      - .github/workflows/ci-example-pennsylvania-api.yml

defaults:
  run:
    working-directory: ./examples/pa-opportunity-example

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Install poetry-audit-plugin
        run: |
          poetry self add poetry-audit-plugin
          $HOME/.local/share/pypoetry/venv/bin/pip install "safety<3.3.0"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install CommonGrants CLI
        run: npm install -g @common-grants/cli

      - name: Install package
        run: make install

      - name: Audit dependencies for vulnerabilities
        # Non-blocking: examples are Tier 2 manually-maintained per
        # DEPENDENCY_MANAGEMENT.md, and CVE tracking is handled outside CI.
        # The step still surfaces findings in logs and PR annotations.
        continue-on-error: true
        run: poetry audit

      - name: Run linting, formatting, and type checking
        run: make checks

      - name: Run tests
        run: make test-coverage

      - name: Generate and validate OpenAPI spec
        run: make check-spec
