name: "CI - Website: Validate and Deploy Preview"

on:
  workflow_call:
  pull_request:
    paths:
      - website/**
      - .github/workflows/ci-website-preview.yml
      - .github/workflows/ci-website-cleanup.yml
      - pnpm-lock.yaml

defaults:
  run:
    working-directory: ./website

env:
  CLOUDFLARE_WORKERS_DOMAIN: billy-daly.workers.dev

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      # Captured from the upload step (not the build step) so deploy-preview
      # only attempts to download when the artifact is actually present. The
      # output is read regardless of validate's overall outcome, so the deploy
      # can run even when a later step (checks/tests/audit) failed.
      artifact_ready: ${{ steps.upload-build.outcome == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build site
        id: build
        # Generates Astro output, TypeSpec emit, and JSON cache used by
        # downstream steps and by the deploy-preview job (via artifact).
        run: pnpm run build

      - name: Upload build output
        # Uploaded immediately after build so a later failure (checks/tests/
        # audit) doesn't suppress the artifact deploy-preview depends on.
        #
        # Path-structure invariant: every entry shares `website/` as common
        # parent, so upload-artifact stores them with that prefix stripped
        # (artifact root = website/). The deploy-preview download then uses
        # `path: website` to restore them at website/dist, website/cache, etc.
        # Adding a path outside `website/` here will shrink the common prefix
        # and silently shift download locations — keep new paths under website/.
        id: upload-build
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: |
            website/dist
            website/tsp-output
            website/.extension-schemas
            website/cache
            website/public/schemas/yaml
            website/public/openapi
          retention-days: 1
          if-no-files-found: error

      - name: Run all checks
        # linting, formatting, spelling, astro checking
        run: pnpm run checks

      - name: Run tests
        run: pnpm run test

      - name: Audit dependencies
        # Calls the npm bulk advisory endpoint directly as a workaround for
        # pnpm audit 410 errors (pnpm/pnpm#11265). Remove this script and
        # revert to `pnpm run audit:high` once pnpm ships native support.
        run: node ${GITHUB_WORKSPACE}/.github/scripts/audit-deps.js --level high

  deploy-preview:
    runs-on: ubuntu-latest
    needs: validate
    # Run when the artifact uploaded successfully, even if a later step in
    # validate (checks/tests/audit) failed. Use `!cancelled()` rather than
    # `always()` so a user-cancelled run doesn't still kick off the deploy.
    # Skipped for dependabot PRs (the cleanup workflow uses the same guard
    # via pull_request.user.login) and on workflow_call where there's no PR
    # number to name the worker.
    if: |
      !cancelled()
      && needs.validate.outputs.artifact_ready == 'true'
      && github.event_name == 'pull_request'
      && github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: website

      - name: Deploy PR preview
        run: pnpm wrangler deploy --name cg-pr-${{ github.event.pull_request.number }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Find existing comment
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: Website Preview Deployed

      - name: Post preview link comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **Website Preview Deployed!**

            Preview your changes at: https://cg-pr-${{ github.event.pull_request.number }}.${{ env.CLOUDFLARE_WORKERS_DOMAIN }}

            This preview will be automatically deleted when the PR is closed.
          edit-mode: replace
