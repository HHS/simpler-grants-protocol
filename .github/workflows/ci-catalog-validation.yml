name: "CI - Catalog: Validate All Workspace Packages"

on:
  pull_request:
    paths:
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - .github/dependabot.yml
      - .github/workflows/ci-catalog-validation.yml
  workflow_dispatch:

jobs:
  validate-workspace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Validate catalog deps in Dependabot ignore list
        run: ./.github/scripts/validate-catalog-deps.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # Calls the npm bulk advisory endpoint directly as a workaround for
        # pnpm audit 410 errors (pnpm/pnpm#11265). Remove this script and
        # revert to `pnpm audit` once pnpm ships native support.
        run: node .github/scripts/audit-deps.js --level moderate

      - name: CI — core
        run: pnpm run ci:core

      - name: CI — changelog-emitter
        run: pnpm run ci:changelog-emitter

      - name: CI — cli
        run: pnpm run ci:cli

      - name: CI — sdk
        run: pnpm run ci:sdk

      - name: CI — website
        run: pnpm run ci:website
