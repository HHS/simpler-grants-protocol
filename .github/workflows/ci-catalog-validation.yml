name: "CI - Catalog: Validate All Workspace Packages"

on:
  pull_request:
    paths:
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - .github/dependabot.yml
      - .github/workflows/ci-catalog-validation.yml
  workflow_dispatch:

jobs:
  validate-workspace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Validate catalog deps in Dependabot ignore list
        run: |
          CATALOG_DEPS=$(awk '/^catalog:/{found=1; next} /^[^ ]/{if(found) exit} found && /^  /' pnpm-workspace.yaml \
            | sed "s/^  //; s/^'//; s/':.*//" | sed "s/:.*//" | sort)
          IGNORE_PATTERNS=$(grep 'dependency-name:' .github/dependabot.yml \
            | sed 's/.*dependency-name: *//; s/"//g; s/'"'"'//g' | sort -u)

          uncovered=()
          while IFS= read -r dep; do
            covered=false
            while IFS= read -r pattern; do
              if [[ "$dep" == $pattern ]]; then
                covered=true
                break
              fi
            done <<< "$IGNORE_PATTERNS"
            if [[ "$covered" == "false" ]]; then
              uncovered+=("$dep")
            fi
          done <<< "$CATALOG_DEPS"

          if [[ ${#uncovered[@]} -gt 0 ]]; then
            echo "::error::Catalog deps not in Dependabot ignore list: ${uncovered[*]}"
            echo "Add them to the ignore: section in .github/dependabot.yml"
            exit 1
          fi
          echo "All catalog deps covered by Dependabot ignore list"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # auditConfig.ignoreGhsas in pnpm-workspace.yaml excludes known advisories;
        # --audit-level=moderate keeps low-severity findings from blocking CI.
        run: pnpm audit --audit-level=moderate

      - name: CI — core
        run: pnpm run ci:core

      - name: CI — changelog-emitter
        run: pnpm run ci:changelog-emitter

      - name: CI — cli
        run: pnpm run ci:cli

      - name: CI — sdk
        run: pnpm run ci:sdk

      - name: CI — website
        run: pnpm run ci:website
