          type: string
          enum:
            - Population groups
          description: The PCS term for the population.
      allOf:
        - $ref: '#/components/schemas/CommonGrants.Fields.PCSTerm'
      description: |-
        A Philanthropy Classification System (PCS) term for populations served.

        See https://taxonomy.candid.org/populations for more information.
    CommonGrants.Fields.PCSSubject:
      type: object
      required:
        - class
      properties:
        class:
          type: string
          enum:
            - Subjects
          description: The PCS term for the subject.
      allOf:
        - $ref: '#/components/schemas/CommonGrants.Fields.PCSTerm'
      description: |-
        A Philanthropy Classification System (PCS) term for the subject of the grant.

        See https://taxonomy.candid.org/subjects for more information.
    CommonGrants.Fields.PCSSupportStrategy:
      type: object
      required:
        - class
      properties:
        class:
          type: string
          enum:
            - Support strategies
          description: The PCS term for the support strategy.
      allOf:
        - $ref: '#/components/schemas/CommonGrants.Fields.PCSTerm'
      description: |-
        A Philanthropy Classification System (PCS) term for support strategies.

        See https://taxonomy.candid.org/support-strategies for more information.
    CommonGrants.Fields.PCSTerm:
      type: object
      required:
        - term
        - class
        - code
      properties:
        term:
          type: string
          description: The plain language PCS term.
        class:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Fields.PCSClass'
          description: The class to which the PCS term belongs.
        code:
          type: string
          pattern: ^[A-Z]{2}[0-9]{6}$
          description: The code for this PCS term.
          example: UC000000
        description:
          type: string
          description: Description of the PCS term
      description: |-
        A Philanthropy Classification System (PCS) term.

        The PCS is a hierarchical classification system for categorizing data related to
        philanthropic activities. It supports the following classes:
        - Organization types
        - Subjects
        - Population groups
        - Transaction types
        - Support strategies

        See https://taxonomy.candid.org/ for more information.
      example:
        term: Hospital
        class: Organization types
        description: Institutions with the primary purpose of providing in-patient physical and mental health services...
        code: EO000000
    CommonGrants.Fields.PCSTransactionType:
      type: object
      required:
        - class
      properties:
        class:
          type: string
          enum:
            - Transaction types
          description: The PCS term for the transaction type.
      allOf:
        - $ref: '#/components/schemas/CommonGrants.Fields.PCSTerm'
      description: |-
        A Philanthropy Classification System (PCS) term for transaction types.

        See https://taxonomy.candid.org/transaction-types for more information.
    CommonGrants.Fields.Phone:
      type: object
      required:
        - countryCode
        - number
      properties:
        countryCode:
          type: string
          pattern: ^\+[1-9][0-9]{0,3}$
          description: The international country code (e.g., "+1" for US/Canada).
        number:
          type: string
          description: The local phone number without the country code.
        extension:
          type: string
          description: Optional extension number for the phone line.
        isMobile:
          type: boolean
          description: Indicates whether this is a mobile/cell phone number.
          default: false
      description: A phone number.
      example:
        countryCode: '+1'
        number: 555-123-4567
        extension: '123'
        isMobile: false
    CommonGrants.Fields.PhoneCollection:
      type: object
      required:
        - primary
      properties:
        primary:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Fields.Phone'
          description: The person's primary phone number.
        fax:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Fields.Phone'
          description: The person's fax number, if applicable.
        otherPhones:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CommonGrants.Fields.Phone'
          description: Additional phone numbers not covered by the standard fields.
      description: A collection of phone numbers for a person.
      example:
        primary:
          countryCode: '+1'
          number: 444-456-1230
          isMobile: true
        fax:
          countryCode: '+1'
          number: 555-123-4567
          extension: '123'
          isMobile: false
        otherPhones:
          support:
            countryCode: '+1'
            number: 333-456-1230
            isMobile: false
          marketing:
            countryCode: '+1'
            number: 444-456-1230
            isMobile: true
    CommonGrants.Fields.SingleDateEvent:
      type: object
      required:
        - eventType
        - date
      properties:
        eventType:
          type: string
          enum:
            - singleDate
          description: Type of event
        date:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.isoDate'
          description: 'Date of the event in in ISO 8601 format: YYYY-MM-DD'
        time:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.isoTime'
          description: 'Time of the event in ISO 8601 format: HH:MM:SS'
      allOf:
        - $ref: '#/components/schemas/CommonGrants.Fields.EventBase'
      description: Description of an event that has a date (and possible time) associated with it
      example:
        name: Opportunity close date
        eventType: singleDate
        date: '2024-12-31'
        time: '17:00:00'
        description: Opportunity closes for all applications
    CommonGrants.Fields.SystemId:
      type: object
      properties:
        registry:
          type: object
          properties:
            code:
              type: string
              description: Canonical CommonGrants registry code, `<schema>:<scope>:<prop>` (e.g. `org:us:ein`).
            url:
              type: string
              format: uri
              description: Link to the catalog entry for this registry.
          description: Registry-level facts shared by every record in this registry.
        id:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.uuid'
          description: |-
            The primary identifier string, when the registry has a single canonical value.

            May be omitted for registries with no natural primary; consumers should read
            `allIds` in that case.
        allIds:
          type: array
          items:
            type: object
            properties:
              id:
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Types.uuid'
                description: The identifier string.
              status:
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Fields.IdentifierStatus'
                description: Whether the identifier is currently valid or retired.
            required:
              - id
              - status
          description: Every known identifier for this record in this registry, including archived values.
      description: |-
        The hosting system's own identifier for a record.

        The identifier value is the record's UUID within the hosting system; the
        registry code names that system (e.g. `org:grants.gov:system`).
      example:
        registry:
          code: org:grants.gov:system
          url: https://commongrants.org/registries/org-grants-gov-system
        id: 01912a8b-7c3d-7890-abcd-ef1234567890
    CommonGrants.Filters.AllOperators:
