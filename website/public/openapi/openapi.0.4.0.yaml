                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.OrgRevision'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 202 response with typed data
        '401':
          description: Access is unauthorized.
          content:
            application/json:
