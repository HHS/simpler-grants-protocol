components:
  parameters:
    CommonGrants.Pagination.PaginatedQueryParams.page:
      name: page
      in: query
      required: false
      description: The page to return
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1
      explode: false
    CommonGrants.Pagination.PaginatedQueryParams.pageSize:
      name: pageSize
      in: query
      required: false
      description: The number of items to return per page
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 100
      explode: false
  schemas:
    CommonGrants.Fields.Address:
      type: object
      required:
        - street1
        - city
        - stateOrProvince
        - country
        - postalCode
      properties:
        street1:
          type: string
          description: The primary street address line.
        street2:
          type: string
          description: Additional street address information (e.g., apartment number, suite, etc.).
        city:
          type: string
          description: The city or municipality name.
        stateOrProvince:
          type: string
          description: The state, province, or region name.
        country:
          type: string
          description: The country name or ISO country code.
        postalCode:
          type: string
          description: The postal or ZIP code for the address.
        latitude:
          type: number
          description: The latitude coordinate of the address location.
        longitude:
          type: number
          description: The longitude coordinate of the address location.
        geography:
          type: object
          additionalProperties: {}
          description: Additional geospatial data in GeoJSON format.
      description: A mailing address.
      example:
        street1: 123 Main St
        city: Anytown
        stateOrProvince: CA
        country: US
        postalCode: '12345'
    CommonGrants.Fields.AddressCollection:
      type: object
      required:
        - primary
      properties:
        primary:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Fields.Address'
          description: The primary address for a person or organization.
        otherAddresses:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CommonGrants.Fields.Address'
          description: Additional addresses keyed by a descriptive label (e.g., "work", "home", "international").
      description: A collection of addresses.
      example:
        primary:
          street1: 456 Main St
          street2: Suite 100
          city: Anytown
          stateOrProvince: CA
          country: US
          postalCode: '12345'
        otherAddresses:
          satellite:
            street1: 456 Main St
            street2: Suite 100
            city: Anytown
            stateOrProvince: CA
            country: US
            postalCode: '12345'
          international:
            street1: 123 Rue Principale
            city: Montreal
            stateOrProvince: QC
            country: CA
            postalCode: H2Y 1C6
    CommonGrants.Fields.CustomField:
      type: object
      required:
        - name
        - fieldType
        - value
      properties:
        name:
          type: string
          description: Name of the custom field
        fieldType:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Fields.CustomFieldType'
          description: The JSON schema type to use when de-serializing the `value` field
        schema:
          type: string
          format: uri
          description: Link to the full JSON schema for this custom field
        value:
          description: Value of the custom field
        description:
          type: string
          description: Description of the custom field's purpose
      description: A custom field on a model
      example:
        name: eligibilityType
        fieldType: array
        value:
          - nonprofit
          - academic
        description: Types of eligible organizations
    CommonGrants.Fields.CustomFieldType:
      type: string
      enum:
        - string
        - number
        - integer
        - boolean
        - object
        - array
      description: The set of JSON schema types supported by a custom field
    CommonGrants.Fields.DateRangeEvent:
      type: object
      required:
        - eventType
        - startDate
        - endDate
      properties:
        eventType:
          type: string
          enum:
            - dateRange
          description: Type of event
        startDate:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.isoDate'
          description: 'Start date of the event in ISO 8601 format: YYYY-MM-DD'
        startTime:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.isoTime'
          description: 'Start time of the event in ISO 8601 format: HH:MM:SS'
        endDate:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.isoDate'
          description: 'End date of the event in ISO 8601 format: YYYY-MM-DD'
        endTime:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.isoTime'
          description: 'End time of the event in ISO 8601 format: HH:MM:SS'
      allOf:
        - $ref: '#/components/schemas/CommonGrants.Fields.EventBase'
      description: Description of an event that has a start and end date (and possible time) associated with it
      example:
        name: Application period
        eventType: dateRange
        startDate: '2024-01-01'
        endDate: '2024-01-31'
        endTime: '17:00:00'
        description: Primary application period for the grant opportunity
    CommonGrants.Fields.EmailCollection:
      type: object
      required:
        - primary
      properties:
        primary:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Types.email'
          description: The primary email address for a person or organization.
        otherEmails:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CommonGrants.Types.email'
          description: Additional email addresses keyed by a descriptive label (e.g., "work", "personal", "support").
      description: A collection of email addresses.
      example:
        primary: john.doe@example.com
        otherEmails:
          work: john.doe@work.com
          personal: john.doe@gmail.com
          school: john.doe@school.edu
    CommonGrants.Fields.Event:
      anyOf:
        - $ref: '#/components/schemas/CommonGrants.Fields.SingleDateEvent'
        - $ref: '#/components/schemas/CommonGrants.Fields.DateRangeEvent'
        - $ref: '#/components/schemas/CommonGrants.Fields.OtherEvent'
      description: Union of all event types
    CommonGrants.Fields.EventBase:
      type: object
      required:
        - name
        - eventType
      properties:
        name:
          type: string
          description: Human-readable name of the event (e.g., 'Application posted', 'Question deadline')
        eventType:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Fields.EventType'
          description: Type of event
        description:
          type: string
          description: Description of what this event represents
      discriminator:
        propertyName: eventType
        mapping:
          dateRange: '#/components/schemas/CommonGrants.Fields.DateRangeEvent'
          other: '#/components/schemas/CommonGrants.Fields.OtherEvent'
          singleDate: '#/components/schemas/CommonGrants.Fields.SingleDateEvent'
      description: Base model for all events
    CommonGrants.Fields.EventType:
      type: string
      enum:
        - singleDate
        - dateRange
        - other
      description: |-
        Type of event (e.g., a single date, a date range, or a custom event)

        - singleDate: A single date (and possible time)
        - dateRange: A period of time with a start and end date
        - other: Other event type (e.g., a recurring event)
    CommonGrants.Fields.File:
      type: object
      required:
        - downloadUrl
        - name
        - createdAt
        - lastModifiedAt
      properties:
        downloadUrl:
          type: string
          format: uri
          description: The file's download URL.
        name:
          type: string
          description: The file's name.
        description:
          type: string
          description: The file's description.
        sizeInBytes:
          type: number
          description: The file's size in bytes.
        mimeType:
          type: string
          description: The file's MIME type.
        createdAt:
          type: string
          format: date-time
          description: The timestamp (in UTC) at which the record was created.
          readOnly: true
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp (in UTC) at which the record was last modified.
          readOnly: true
      description: A field representing a downloadable file.
      example:
        downloadUrl: https://example.com/file.pdf
        name: example.pdf
        description: A PDF file with instructions
        sizeInBytes: 1000
        mimeType: application/pdf
        createdAt: '2025-01-01T17:01:01'
        lastModifiedAt: '2025-01-02T17:30:00'
    CommonGrants.Fields.Identifier:
      type: object
      properties:
        registry:
          type: object
          properties:
            code:
              type: string
              description: Canonical CommonGrants registry code, `<schema>:<scope>:<prop>` (e.g. `org:us:ein`).
            url:
              type: string
              format: uri
              description: Link to the catalog entry for this registry.
          description: Registry-level facts shared by every record in this registry.
        id:
          type: string
          description: |-
            The primary identifier string, when the registry has a single canonical value.

            May be omitted for registries with no natural primary; consumers should read
            `allIds` in that case.
        allIds:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The identifier string.
              status:
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Fields.IdentifierStatus'
                description: Whether the identifier is currently valid or retired.
            required:
              - id
              - status
          description: Every known identifier for this record in this registry, including archived values.
      description: |-
        An identifier issued to a record by a registry.

        Accepts any string value and any registry code. Model-specific collections use
        registry-typed instantiations of `IdentifierT` (e.g. `OrgIdEin`) for their base
        identifiers, and this generic form for extension identifiers under `otherIds`.
      example:
        registry:
          code: org:us:ein
          url: https://commongrants.org/registries/org-us-ein
        id: '123456789'
        allIds:
          - id: '123456789'
            status: active
          - id: '987654321'
            status: archived
    CommonGrants.Fields.IdentifierCollection:
      type: object
      properties:
        systemId:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Fields.SystemId'
          description: The hosting system's own identifier for this record.
        otherIds:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CommonGrants.Fields.Identifier'
          description: |-
            Additional identifiers keyed by their registry code, for registries the
            protocol does not define as a base identifier on the model.
      description: A collection of identifiers associated with a record.
      example:
        systemId:
          registry:
            code: org:grants.gov:system
            url: https://commongrants.org/registries/org-grants-gov-system
          id: 01912a8b-7c3d-7890-abcd-ef1234567890
        otherIds:
          org:candid:bridge:
            registry:
              code: org:candid:bridge
            id: '1234567'
    CommonGrants.Fields.IdentifierStatus:
      type: string
      enum:
        - active
        - archived
      description: The lifecycle status of an identifier value.
