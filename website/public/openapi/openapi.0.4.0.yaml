        - $ref: '#/components/schemas/CommonGrants.Responses.Success'
      description: A paginated list of items with a sort order
    CommonGrants.Responses.Success:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: integer
          format: int32
          example: 200
        message:
          type: string
          example: Success
    CommonGrants.Sorting.SortBodyParams:
      type: object
      required:
        - sortBy
      properties:
        sortBy:
          description: The field to sort by
          example: lastModifiedAt
        customSortBy:
          type: string
          description: Implementation-defined sort key
          example: customField
        sortOrder:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Sorting.SortOrder'
          description: The order to sort by
          example: asc
      description: Sorting parameters included in the request body
    CommonGrants.Sorting.SortOrder:
      type: string
      enum:
        - asc
        - desc
    CommonGrants.Sorting.SortedResultsInfo:
      type: object
      required:
        - sortBy
        - sortOrder
      properties:
        sortBy:
          type: string
          description: The field results are sorted by, or "custom" if an implementation-defined sort key is used
          example: lastModifiedAt
        customSortBy:
          type: string
          description: Implementation-defined sort key used to sort the results, if applicable
          example: customField
        sortOrder:
          allOf:
            - $ref: '#/components/schemas/CommonGrants.Sorting.SortOrder'
          description: The order in which the results are sorted, e.g. ascending or descending
          example: asc
        errors:
          type: array
          items:
            type: string
          description: Non-fatal errors that occurred during sorting
      description: Information about the sort order of the items returned
    CommonGrants.Types.calendarYear:
      type: string
      pattern: ^[0-9]{4}$
      description: A calendar year
      example: '2025'
    CommonGrants.Types.decimalString:
      type: string
      pattern: ^-?[0-9]+\.?[0-9]*$
      description: A decimal number (with variable scale) encoded as a string, to avoid floating point issues
      example: '-100.5'
    CommonGrants.Types.duns:
      type: string
      pattern: ^[0-9]{9}$
      description: A Data Universal Numbering System (DUNS) number, normalized to nine digits
      example: '123456789'
    CommonGrants.Types.email:
      type: string
      format: email
      description: An email address
      example: test@example.com
    CommonGrants.Types.employerTaxId:
      type: string
      pattern: ^[0-9]{9}$
      description: An Employer Identification Number (EIN) issued by the IRS, normalized to nine digits
      example: '123456789'
    CommonGrants.Types.isoDate:
      type: string
      format: date
      description: A date on a calendar in ISO 8601 format YYYY-MM-DD
      example: '2025-01-01'
    CommonGrants.Types.isoTime:
      type: string
      format: time
      description: A time on a clock, without a timezone, in ISO 8601 format HH:mm:ss
      example: '17:00:00'
    CommonGrants.Types.samUEI:
      type: string
      pattern: ^[A-HJ-NP-Z0-9]{12}$
      description: A Unique Entity Identifier (UEI) issued by SAM.gov
      example: AB0123456789
    CommonGrants.Types.uuid:
      type: string
      format: uuid
      description: A universally unique identifier
      example: 30a12e5e-5940-4c08-921c-17a8960fcf4b
