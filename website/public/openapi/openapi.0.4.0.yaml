openapi: 3.0.0
info:
  title: CommonGrants Base API
  description: |-
    The base OpenAPI specification for a CommonGrants API

    In order for an API to be "compliant" with the CommonGrants protocol,
    it must implement all of the routes with the "required" tag in this specification.
  version: 0.4.0
tags:
  - name: Organizations
    description: Endpoints related to viewing and syncing organization profiles
  - name: Awards
    description: Endpoints related to grant awards
  - name: Opportunities
    description: Endpoints related to funding opportunities
  - name: Competitions
    description: Endpoints related to competitions, which are distinct application processes for the same funding opportunity
  - name: Applications
    description: Endpoints related to submitting applications for a given competition
  - name: Application Reviews
    description: Endpoints related to reviewing applications for a given competition
  - name: Forms
    description: Endpoints related to forms
  - name: required
    description: Endpoints that MUST be implemented by all CommonGrants APIs
  - name: optional
    description: Endpoints that MAY be implemented by CommonGrants APIs
  - name: experimental
    description: Endpoints that MAY be implemented by CommonGrants APIs, but are not guaranteed to be stable
paths:
  /common-grants/applications/search:
    post:
      operationId: Applications_searchApplications
      summary: Search applications
      description: 'Search for applications. Note: The search results for a given query will depend on the scopes attached to the API token used to make the request.'
      parameters:
        - name: filters
          in: query
          required: true
          description: The filters to apply to the search
          schema:
            $ref: '#/components/schemas/CommonGrants.Models.AppFilters'
          explode: false
        - name: sorting
          in: query
          required: true
          description: The sorting to apply to the search
          schema:
            $ref: '#/components/schemas/CommonGrants.Models.AppSorting'
          explode: false
      responses:
        '200':
          description: A paginated list of typed items with a typed filter
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - paginationInfo
                  - sortInfo
                  - filterInfo
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommonGrants.Models.ApplicationBase'
                    description: Items from the current page
                  paginationInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedResultsInfo'
                    description: Details about the paginated results
                  sortInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Sorting.SortedResultsInfo'
                    description: The sort order of the items
                  filterInfo:
                    type: object
                    properties:
                      filters:
                        $ref: '#/components/schemas/CommonGrants.Models.AppFilters'
                      errors:
                        type: array
                        items:
                          type: string
                        description: Non-fatal errors that occurred during filtering
                    required:
                      - filters
                    description: The filters applied to the response items
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A paginated list of typed items with a typed filter
      tags:
        - Applications
        - experimental
        - Application Reviews
  /common-grants/applications/start:
    post:
      operationId: Applications_startApplication
      summary: Start an application
      description: Start a new application for a given competition.
      parameters: []
      responses:
        '201':
          description: A 201 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.ApplicationBase'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 201 response with typed data
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
      tags:
        - Applications
        - experimental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                competitionId:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Types.uuid'
                  description: The ID of the competition to start an application for
                organizationId:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Types.uuid'
                  description: The ID of the organization to start an application for, if applying on behalf of an organization
                title:
                  type: string
                  description: The title of the application
              required:
                - competitionId
                - title
  /common-grants/applications/{appId}:
    get:
      operationId: Applications_getApplication
      summary: View an application
      description: View an application for a given competition, along with its form responses and validation errors.
      parameters:
        - name: appId
          in: path
          required: true
          description: The ID of the application to get
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.ApplicationBase'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
      tags:
        - Applications
        - experimental
  /common-grants/applications/{appId}/forms/{formId}:
    put:
      operationId: Applications_setFormResponse
      summary: Respond to a form
      description: Set or update the response to a given form in an application.
      parameters:
        - name: appId
          in: path
          required: true
          description: The ID of the application to whose form response is being updated
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
        - name: formId
          in: path
          required: true
          description: The ID of the form whose response is being updated
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.AppFormResponse'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
      tags:
        - Applications
        - experimental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        description: The response to the form
    get:
      operationId: Applications_getFormResponse
      summary: Get a form response
      description: Get the response to a given form in an application.
      parameters:
        - name: appId
          in: path
          required: true
          description: The ID of the application to whose form response is being retrieved
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
        - name: formId
          in: path
          required: true
          description: The ID of the form whose response is being retrieved
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.AppFormResponse'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
      tags:
        - Applications
        - experimental
  /common-grants/applications/{appId}/submit:
    put:
      operationId: Applications_submitApplication
      summary: Submit an application
      description: Submit an application to a competition. Applications that have validation errors will be blocked from submitting until the errors are fixed.
      parameters:
        - name: appId
          in: path
          required: true
          description: The ID of the application to submit
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.ApplicationSubmissionError'
      tags:
        - Applications
        - experimental
  /common-grants/awards:
    get:
      operationId: Awards_list
      summary: List awards
      description: Get a paginated list of awards, sorted by `lastModifiedAt` with most recent first.
      parameters:
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.page'
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.pageSize'
      responses:
        '200':
          description: A 200 response with a paginated list of typed items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - paginationInfo
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommonGrants.Models.AwardBase'
                    description: Items from the current page
                  paginationInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedResultsInfo'
                    description: Details about the paginated results
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with a paginated list of typed items
      tags:
        - Awards
        - experimental
  /common-grants/awards/search:
    post:
      operationId: Awards_search
      summary: Search awards
      description: Search for awards based on the provided filters.
      parameters: []
      responses:
        '200':
          description: A paginated list of typed items with a typed filter
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - paginationInfo
                  - sortInfo
                  - filterInfo
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommonGrants.Models.AwardBase'
                    description: Items from the current page
                  paginationInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedResultsInfo'
                    description: Details about the paginated results
                  sortInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Sorting.SortedResultsInfo'
                    description: The sort order of the items
                  filterInfo:
                    type: object
                    properties:
                      filters:
                        $ref: '#/components/schemas/CommonGrants.Models.AwdFilters'
                      errors:
                        type: array
                        items:
                          type: string
                        description: Non-fatal errors that occurred during filtering
                    required:
                      - filters
                    description: The filters applied to the response items
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A paginated list of typed items with a typed filter
      tags:
        - Awards
        - experimental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                  description: Award search query
                  example: Community health center
                filters:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Models.AwdFilters'
                  description: |-
                    Filters to apply to the award search

                    Multiple filter conditions will be combined with AND logic, so that
                    results only include awards that match all of the provided filters.
                sorting:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Models.AwdSorting'
                  description: The sort order to apply to the results
                pagination:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedBodyParams'
                  description: Pagination instructions for the results
  /common-grants/awards/{awdId}:
    get:
      operationId: Awards_read
      summary: View award details
      description: View details about an award.
      parameters:
        - name: awdId
          in: path
          required: true
          description: The ID of the award to view
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.AwardBase'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
      tags:
        - Awards
        - experimental
  /common-grants/competitions/{compId}:
    get:
      operationId: Competitions_read
      summary: View competition details
      description: |-
        View details about a competition for a given funding opportunity.

        Each competition may have a distinct set of forms, be limited to a
        certain types of applicants, or have a different application period.
      parameters:
        - name: compId
          in: path
          required: true
          description: The ID of the competition to view
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.CompetitionBase'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
      tags:
        - Competitions
        - experimental
  /common-grants/forms:
    get:
      operationId: Forms_list
      summary: List forms
      description: Get a paginated list of forms, sorted by `lastModifiedAt` with most recent first.
      parameters:
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.page'
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.pageSize'
      responses:
        '200':
          description: A 200 response with a paginated list of typed items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - paginationInfo
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommonGrants.Models.FormBase'
                    description: Items from the current page
                  paginationInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedResultsInfo'
                    description: Details about the paginated results
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with a paginated list of typed items
      tags:
        - Forms
        - experimental
  /common-grants/forms/{formId}:
    get:
      operationId: Forms_read
      summary: View form details
      description: View details about a given form.
      parameters:
        - name: formId
          in: path
          required: true
          description: The ID of the form to view
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.FormBase'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
      tags:
        - Forms
        - experimental
  /common-grants/opportunities:
    get:
      operationId: Opportunities_list
      summary: List opportunities
      description: Get a paginated list of opportunities, sorted by `lastModifiedAt` with most recent first.
      parameters:
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.page'
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.pageSize'
      responses:
        '200':
          description: A 200 response with a paginated list of typed items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - paginationInfo
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommonGrants.Models.OpportunityBase'
                    description: Items from the current page
                  paginationInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedResultsInfo'
                    description: Details about the paginated results
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with a paginated list of typed items
      tags:
        - Opportunities
        - required
  /common-grants/opportunities/search:
    post:
      operationId: Opportunities_search
      summary: Search opportunities
      description: Search for opportunities based on the provided filters.
      parameters: []
      responses:
        '200':
          description: A paginated list of typed items with a typed filter
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - paginationInfo
                  - sortInfo
                  - filterInfo
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommonGrants.Models.OpportunityBase'
                    description: Items from the current page
                  paginationInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedResultsInfo'
                    description: Details about the paginated results
                  sortInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Sorting.SortedResultsInfo'
                    description: The sort order of the items
                  filterInfo:
                    type: object
                    properties:
                      filters:
                        $ref: '#/components/schemas/CommonGrants.Models.OppFilters'
                      errors:
                        type: array
                        items:
                          type: string
                        description: Non-fatal errors that occurred during filtering
                    required:
                      - filters
                    description: The filters applied to the response items
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A paginated list of typed items with a typed filter
      tags:
        - Opportunities
        - optional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                  description: Opportunity search query
                  example: Pre-school education
                filters:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Models.OppFilters'
                  description: |-
                    Filters to apply to the opportunity search

                    Multiple filter conditions will be combined with AND logic, so that
                    results only include opportunities that match all of the provided filters.
                sorting:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Models.OppSorting'
                  description: The sort order to apply to the results
                pagination:
                  allOf:
                    - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedBodyParams'
                  description: Pagination instructions for the results
  /common-grants/opportunities/{oppId}:
    get:
      operationId: Opportunities_read
      summary: View opportunity details
      description: View details about an opportunity.
      parameters:
        - name: oppId
          in: path
          required: true
          description: The ID of the opportunity to view
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.OpportunityDetails'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
      tags:
        - Opportunities
        - required
  /common-grants/orgs:
    get:
      operationId: Organizations_list
      summary: List organizations
      description: Get a paginated list of organizations. Requires the `org:read` scope.
      parameters:
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.page'
        - $ref: '#/components/parameters/CommonGrants.Pagination.PaginatedQueryParams.pageSize'
        - name: registry
          in: query
          required: false
          description: Registry code of an external identifier to filter by (e.g. `us:ein`)
          schema:
            type: string
          explode: false
        - name: id
          in: query
          required: false
          description: Identifier value within the given registry to filter by
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: A 200 response with a paginated list of typed items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - paginationInfo
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommonGrants.Models.OrganizationBase'
                    description: Items from the current page
                  paginationInfo:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Pagination.PaginatedResultsInfo'
                    description: Details about the paginated results
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with a paginated list of typed items
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
      tags:
        - Organizations
        - experimental
      security:
        - OAuth2Auth:
            - org:read
  /common-grants/orgs/{orgId}:
    get:
      operationId: Organizations_read
      summary: View an organization profile
      description: View an organization profile by its UUID. Requires the `org:read` scope.
      parameters:
        - name: orgId
          in: path
          required: true
          description: The UUID of the organization to view
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
        - name: at
          in: query
          required: false
          description: Return the profile as of the given point in time
          schema:
            type: string
            format: date-time
          explode: false
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.OrganizationBase'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
      tags:
        - Organizations
        - experimental
      security:
        - OAuth2Auth:
            - org:read
    patch:
      operationId: Organizations_update
      summary: Update an organization profile
      description: Apply a direct JSON Merge Patch edit to an organization profile, recorded as an accepted change. Requires the `org:write` scope.
      parameters:
        - name: orgId
          in: path
          required: true
          description: The UUID of the organization to update
          schema:
            $ref: '#/components/schemas/CommonGrants.Types.uuid'
      responses:
        '200':
          description: A 200 response with typed data
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/CommonGrants.Models.OrgRevision'
                    description: Response data
                allOf:
                  - $ref: '#/components/schemas/CommonGrants.Responses.Success'
                description: A 200 response with typed data
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonGrants.Responses.Error'
