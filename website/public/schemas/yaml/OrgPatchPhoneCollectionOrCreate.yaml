$schema: https://json-schema.org/draft/2020-12/schema
$id: OrgPatchPhoneCollectionOrCreate.yaml
type: object
properties:
  primary:
    $ref: OrgPatchPhoneOrCreate.yaml
    description: The person's primary phone number.
  fax:
    anyOf:
      - $ref: OrgPatchPhoneOrCreate.yaml
      - type: "null"
    description: The person's fax number, if applicable.
  otherPhones:
    anyOf:
      - $ref: "#/$defs/OrgPatchRecordOrCreatePhone"
      - type: "null"
    description: Additional phone numbers not covered by the standard fields.
unevaluatedProperties:
  not: {}
examples:
  - primary:
      countryCode: "+1"
      number: 444-456-1230
      isMobile: true
    fax:
      countryCode: "+1"
      number: 555-123-4567
      extension: "123"
      isMobile: false
    otherPhones:
      support:
        countryCode: "+1"
        number: 333-456-1230
        isMobile: false
      marketing:
        countryCode: "+1"
        number: 444-456-1230
        isMobile: true
  - primary:
      countryCode: "+1"
      number: 444-456-1230
      isMobile: true
    otherPhones:
      home:
        countryCode: "+1"
        number: 333-456-1230
        isMobile: false
description: A collection of phone numbers for a person.
$defs:
  OrgPatchRecordOrCreatePhone:
    type: object
    properties: {}
    unevaluatedProperties:
      $ref: OrgPatchPhoneOrCreate.yaml
