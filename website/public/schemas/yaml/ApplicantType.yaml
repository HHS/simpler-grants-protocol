$schema: https://json-schema.org/draft/2020-12/schema
$id: ApplicantType.yaml
type: object
properties:
  value:
    $ref: ApplicantTypeOptions.yaml
    description: The selected value, from a predefined set of options
  customValue:
    type: string
    description: A custom value, used when the selected value is the `custom` option
  description:
    type: string
    description: A human-readable description of the value
required:
  - value
unevaluatedProperties:
  not: {}
examples:
  - value: individual
    description: An individual applicant
  - value: organization
    description: Any type of organization
description: The type of applicant eligible to apply for funding
