$schema: https://json-schema.org/draft/2020-12/schema
$id: FormResponseStatus.yaml
type: object
properties:
  value:
    $ref: FormResponseStatusOptions.yaml
    description: The selected value, from a predefined set of options
  customValue:
    type: string
    description: A custom value, used when the selected value is the `custom` option
  description:
    type: string
    description: A human-readable description of the value
required:
  - value
unevaluatedProperties:
  not: {}
examples:
  - value: inProgress
    description: The form response is in progress
description: The status of the form response
